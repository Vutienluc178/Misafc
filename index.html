        /* Bench */

        .btn-remove-player { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: var(--danger); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; line-height: 1; border: 1px solid white; z-index: 5; }
        .card-name { font-size: 11px; font-weight: 600; margin-bottom: 2px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-tags { display: flex; gap: 3px; margin-bottom: 4px;}
        .card-tag { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .card-time { font-size: 9px; font-weight: bold; color: #10b981; background: #d1fae5; padding: 2px 6px; border-radius: 10px; }
        .empty-bench { grid-column: 1 / -1; text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH INTRO MÀU HỒNG -->
    <div id="intro-screen">
        <div class="intro-logo">🏆</div>

        <div class="intro-text-sub">Vô địch DNOL st26</div>
    </div>

    <div class="pitch-wrapper" id="pitchWrapper">
        <div class="pitch" id="pitch">
            <div class="center-line"></div>
            <div class="center-circle"></div>
            <div class="center-dot"></div>
            <div class="penalty-area left"></div>

            <div class="watermark">MN MISA FC</div>
            <canvas id="drawCanvas"></canvas>
            
            <div class="draggable-item football-token" id="match-ball" style="left: 50%; top: 50%;">⚽️</div>

        </div>
    </div>

    <div class="controls-container">
        
        <div class="timer-panel">
            <div class="timer-top-row">
                <div class="half-selector">
                    <button class="half-btn active" id="btnHalf1" onclick="setHalf(1)">Hiệp 1</button>
                    <button class="half-btn" id="btnHalf2" onclick="setHalf(2)">Hiệp 2</button>
                </div>
                <div class="time-setting">
                    <span>1 Hiệp:</span>
                    <input type="number" id="halfTimeInput" value="30" min="1" max="90"><span>'</span>
                </div>
            </div>

            <div class="timer-main-controls">
                <div class="timer-display" id="matchTimer">00:00</div>
                <div class="timer-buttons">
                    <button class="btn-icon btn-play" id="btnPlayPause" onclick="toggleTimer()">▶</button>
                </div>
                <button class="btn-new-match" onclick="resetMatch()">⛔ Trận Mới</button>
            </div>
        </div>

        <div class="tactical-tools">
            <button class="btn-tool" id="btnToggleDraw" onclick="toggleDrawMode()">🖌 Bút vẽ chiến thuật</button>
            <button class="btn-tool" onclick="clearDrawings()">🧹 Xóa nét</button>
            <button class="btn-tool" onclick="saveFormation()">💾 Lưu đội hình</button>
            <button class="btn-tool" onclick="loadFormation()">📂 Tải đội hình</button>
        </div>

            <div class="input-group">
                <input type="text" id="playerName" placeholder="Tên cầu thủ...">
                <button class="btn-add" onclick="addPlayer()">Thêm</button>
            </div>
            <button class="btn-add-opponent" onclick="addOpponent()">👤 Địch</button>
        </div>

            <span class="color-label">Màu:</span>

                <div class="swatch tag-red" data-color="red" onclick="toggleColor(this)"></div>
                <div class="swatch tag-blue" data-color="blue" onclick="toggleColor(this)"></div>
                <div class="swatch tag-yellow" data-color="yellow" onclick="toggleColor(this)"></div>
                <div class="swatch tag-white" data-color="white" onclick="toggleColor(this)"></div>
            </div>
        </div>

        <div class="bench-area">
            <div class="bench-header">
                <span class="bench-title">Dự bị <span style="font-weight: normal; color: gray; font-size: 11px;">(Đang nghỉ)</span></span>
            </div>
            <div class="player-grid" id="playerList"></div>
        </div>
    </div>

    <script>
        // --- XỬ LÝ MÀN HÌNH INTRO ---
        window.addEventListener('load', () => {
            const intro = document.getElementById('intro-screen');
            // Sau 2 giây (2000ms), bắt đầu mờ dần
            setTimeout(() => {
                intro.classList.add('hidden');
                // Chờ hiệu ứng mờ kết thúc (0.5s) rồi xóa hoàn toàn khỏi layout
                setTimeout(() => {
                    intro.style.display = 'none';
                }, 500);
            }, 2000);

            // Tải dữ liệu cũ
            loadPlayers(); 
            renderBench(); 
            setTimeout(resizeCanvas, 100); 
        });

        // --- CÁC LOGIC SA BÀN BÊN DƯỚI GIỮ NGUYÊN ---
        const pitch = document.getElementById('pitch');
        const ball = document.getElementById('match-ball');
        makeDraggable(ball);

        // --- FULLSCREEN & HOÁN ĐỔI TỌA ĐỘ 90 ĐỘ ---
        function toggleFullscreen() {
            const isEnteringFullscreen = !document.body.classList.contains('fullscreen-mode');
            const pitchRect = pitch.getBoundingClientRect();
            const tokens = document.querySelectorAll('.draggable-item');
            const newPositions = [];
            
            tokens.forEach(el => {
                const currentPctX = (el.offsetLeft / pitchRect.width) * 100;
                const currentPctY = (el.offsetTop / pitchRect.height) * 100;
                newPositions.push({ el: el, newX: currentPctY, newY: currentPctX });
            });

            document.body.classList.toggle('fullscreen-mode');

            const btn = document.getElementById('btnFullscreenToggle');
            if(isEnteringFullscreen) {
                btn.innerHTML = '❌ Thu nhỏ lại';
            } else {
                btn.innerHTML = '⤢ Xoay dọc toàn màn';
            }

            newPositions.forEach(item => {
                item.el.style.left = item.newX + '%';
                item.el.style.top = item.newY + '%';
            });

            clearDrawings();
            setTimeout(resizeCanvas, 400); 
        }

        // --- CANVAS LOGIC ---
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, drawMode = false;
        const btnToggleDraw = document.getElementById('btnToggleDraw');

        function resizeCanvas() {
            canvas.width = pitch.offsetWidth; canvas.height = pitch.offsetHeight;
            ctx.strokeStyle = '#fde047'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resizeCanvas);

        function toggleDrawMode() {
            drawMode = !drawMode;
            if(drawMode) { btnToggleDraw.classList.add('active-draw'); btnToggleDraw.innerHTML = '✅ Đang vẽ...'; canvas.classList.add('draw-mode'); } 
            else { btnToggleDraw.classList.remove('active-draw'); btnToggleDraw.innerHTML = '🖌 Bút vẽ chiến thuật'; canvas.classList.remove('draw-mode'); }
        }
        function clearDrawings() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX, clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function startDraw(e) { if(!drawMode) return; e.preventDefault(); isDrawing = true; const pos = getPointerPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { if(!isDrawing || !drawMode) return; e.preventDefault(); const pos = getPointerPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function stopDraw() { isDrawing = false; ctx.beginPath(); }
        canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw); canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false}); canvas.addEventListener('touchmove', draw, {passive: false}); canvas.addEventListener('touchend', stopDraw);

        function formatPlayerTime(totalSec) {
            if(!totalSec) return "00:00";
            const m = Math.floor(totalSec / 60); const s = totalSec % 60;
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }

        // --- QUẢN LÝ THỜI GIAN & HIỆP ĐẤU ---
        let matchSeconds = 0, timerInterval = null, isRunning = false;
        let currentHalf = 1;
        const timerDisplay = document.getElementById('matchTimer');
        const btnPlayPause = document.getElementById('btnPlayPause');
        const halfTimeInput = document.getElementById('halfTimeInput');
        const btnHalf1 = document.getElementById('btnHalf1');
        const btnHalf2 = document.getElementById('btnHalf2');

        function updateTimerDisplay() {
            const min = Math.floor(matchSeconds / 60), sec = matchSeconds % 60;
            timerDisplay.textContent = `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
            if (min >= (parseInt(halfTimeInput.value) || 30)) timerDisplay.classList.add('overtime');
            else timerDisplay.classList.remove('overtime');
        }

        function setHalf(half) {
            if(half === currentHalf) return;
            if(confirm(`Chuyển sang Hiệp ${half}? Đồng hồ chính sẽ về 00:00.`)) {
                if(isRunning) toggleTimer();
                currentHalf = half;
                if(half === 1) { btnHalf1.classList.add('active'); btnHalf2.classList.remove('active'); } 
                else { btnHalf2.classList.add('active'); btnHalf1.classList.remove('active'); }
                matchSeconds = 0; updateTimerDisplay();
            }
        }

        function toggleTimer() {
            if (isRunning) { 
                clearInterval(timerInterval); btnPlayPause.textContent = '▶'; btnPlayPause.className = 'btn-icon btn-play'; savePlayers(); 
            } else { 
                timerInterval = setInterval(() => { 
                    matchSeconds++; updateTimerDisplay(); 
                    let needUpdateUI = false;
                    players.forEach(p => {
                        if (p.onPitch) {
                            p.totalSecondsPlayed = (p.totalSecondsPlayed || 0) + 1;
                            const timeBadge = document.getElementById(`time-badge-${p.id}`);
                            if(timeBadge) timeBadge.textContent = `⏱ ${formatPlayerTime(p.totalSecondsPlayed)}`;
                            needUpdateUI = true;
                        }
                    });
                    if(needUpdateUI && matchSeconds % 5 === 0) savePlayers();
                }, 1000); 
                btnPlayPause.textContent = '⏸'; btnPlayPause.className = 'btn-icon btn-pause'; 
            }
            isRunning = !isRunning;
        }

        function resetMatch() {
            if(confirm("TẠO TRẬN MỚI? Thời gian cá nhân sẽ xóa sạch về 0.")) {
                if(isRunning) toggleTimer();
                matchSeconds = 0; updateTimerDisplay(); clearDrawings();
                currentHalf = 1; btnHalf1.classList.add('active'); btnHalf2.classList.remove('active');
                players.forEach(p => { p.onPitch = false; p.totalSecondsPlayed = 0; });
                document.querySelectorAll('.player-token, .opponent-token').forEach(t => t.remove());
                ball.style.left = '50%'; ball.style.top = '50%';
                renderBench(); savePlayers();
            }
        }

        // --- CẦU THỦ & LOCAL STORAGE ---
        const PLAYERS_KEY = 'saBanBongDa_Players';
        let players = []; 
        const playerListEl = document.getElementById('playerList');
        const playerNameInput = document.getElementById('playerName');
        const colorPriority = { 'red': 1, 'blue': 2, 'yellow': 3, 'white': 4 };
        const colorClasses = { 'red': 'tag-red', 'blue': 'tag-blue', 'yellow': 'tag-yellow', 'white': 'tag-white' };
        let selectedColors = new Set();

        function savePlayers() { localStorage.setItem(PLAYERS_KEY, JSON.stringify(players)); }
        function loadPlayers() { 
            const stored = localStorage.getItem(PLAYERS_KEY); 
            players = stored ? JSON.parse(stored) : []; 
            players.forEach(p => { p.onPitch = false; if(p.totalSecondsPlayed === undefined) p.totalSecondsPlayed = 0; });
        }

        function toggleColor(el) {
            const color = el.getAttribute('data-color');
            if (selectedColors.has(color)) { selectedColors.delete(color); el.classList.remove('active'); } 
            else { selectedColors.add(color); el.classList.add('active'); }
        }
        function resetColors() { selectedColors.clear(); document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active')); }

        function addPlayer() {
            const name = playerNameInput.value.trim();
            if (!name) return;
            players.push({ id: Date.now().toString(), name: name, tags: Array.from(selectedColors), onPitch: false, totalSecondsPlayed: 0 });
            savePlayers(); renderBench();
            playerNameInput.value = ''; resetColors(); playerNameInput.focus();
        }

        function deletePlayerCompletely(id, event) {
            event.stopPropagation();
            if(confirm("Xóa VĨNH VIỄN cầu thủ này?")) {
                players = players.filter(p => p.id !== id); savePlayers();
                const token = document.getElementById(`token-${id}`); if(token) token.remove();
                renderBench();
            }
        }

        function renderBench() {
            playerListEl.innerHTML = '';
            const benchedPlayers = players.filter(p => !p.onPitch);

            if (benchedPlayers.length === 0) {
                if (players.length > 0) playerListEl.innerHTML = '<div class="empty-bench">Tất cả đang đá.</div>';
                else playerListEl.innerHTML = '<div class="empty-bench">Chưa có cầu thủ.<br>Thêm ở trên nhé!</div>';
                return;
            }

            const sortedPlayers = [...benchedPlayers].sort((a, b) => {
                const valA = a.tags.length > 0 ? colorPriority[a.tags[0]] : 99;
                const valB = b.tags.length > 0 ? colorPriority[b.tags[0]] : 99;
                return valA - valB;
            });

            sortedPlayers.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => addToPitch(player);
                let tagsHtml = player.tags.map(tag => `<div class="card-tag ${colorClasses[tag]}"></div>`).join('');
                
                card.innerHTML = `
                    <div class="btn-remove-player" onclick="deletePlayerCompletely('${player.id}', event)">×</div>
                    <div class="card-name" title="${player.name}">${player.name}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    <div class="card-time">⏱ ${formatPlayerTime(player.totalSecondsPlayed)}</div>
                `;
                playerListEl.appendChild(card);
            });
        }

        function addToPitch(player, leftPct = null, topPct = null) {
            if(document.getElementById(`token-${player.id}`)) return;
            player.onPitch = true; renderBench(); savePlayers();

            const token = document.createElement('div');
            token.className = 'draggable-item player-token';
            token.id = `token-${player.id}`;
            token.dataset.playerId = player.id;

            const initial = player.name.substring(0, 2).toUpperCase();
            let tagsHtml = player.tags.map(tag => `<div class="token-tag-dot ${colorClasses[tag]}"></div>`).join('');

            token.innerHTML = `
                <span>${initial}</span>
                <div class="token-tags">${tagsHtml}</div>
                <div class="token-time" id="time-badge-${player.id}">⏱ ${formatPlayerTime(player.totalSecondsPlayed)}</div>
            `;

            if(leftPct !== null && topPct !== null) { token.style.left = leftPct + '%'; token.style.top = topPct + '%'; } 
            else { const offsetX = Math.floor(Math.random() * 60) - 80; token.style.left = `calc(50% + ${offsetX}px)`; token.style.top = `50%`; }

            pitch.appendChild(token); makeDraggable(token);
        }

        function addOpponent(leftPct = null, topPct = null) {
            const token = document.createElement('div');
            token.className = 'draggable-item opponent-token';
            token.innerHTML = '👤';
            if(leftPct !== null && topPct !== null) { token.style.left = leftPct + '%'; token.style.top = topPct + '%'; } 
            else { const offsetX = Math.floor(Math.random() * 60) + 40; const offsetY = Math.floor(Math.random() * 80) - 40; token.style.left = `calc(50% + ${offsetX}px)`; token.style.top = `calc(50% + ${offsetY}px)`; }
            pitch.appendChild(token); makeDraggable(token);
        }

        // --- LƯU ĐỘI HÌNH ---
        const FORMATION_KEY = 'saBan_Formation';
        function saveFormation() {
            const formation = [];
            document.querySelectorAll('.draggable-item').forEach(el => {
                const percentLeft = (el.offsetLeft / pitch.offsetWidth) * 100;
                const percentTop = (el.offsetTop / pitch.offsetHeight) * 100;
                if (el.classList.contains('player-token')) {
                    const id = el.id.replace('token-', ''); formation.push({ type: 'player', id: id, x: percentLeft, y: percentTop });
                } else if (el.classList.contains('opponent-token')) { formation.push({ type: 'opponent', x: percentLeft, y: percentTop });
                } else if (el.classList.contains('football-token')) { formation.push({ type: 'ball', x: percentLeft, y: percentTop }); }
            });
            localStorage.setItem(FORMATION_KEY, JSON.stringify(formation)); alert("Đã lưu đội hình hiện tại thành công!");
        }
        function loadFormation() {
            const stored = localStorage.getItem(FORMATION_KEY);
            if (!stored) { alert("Chưa có đội hình nào được lưu!"); return; }
            const formation = JSON.parse(stored);
            players.forEach(p => p.onPitch = false); document.querySelectorAll('.player-token, .opponent-token').forEach(t => t.remove());
            formation.forEach(item => {
                if (item.type === 'ball') { ball.style.left = item.x + '%'; ball.style.top = item.y + '%'; } 
                else if (item.type === 'opponent') { addOpponent(item.x, item.y); }
                else if (item.type === 'player') { const player = players.find(p => p.id === item.id); if (player) addToPitch(player, item.x, item.y); }
            });
            renderBench(); alert("Đã tải lại đội hình!");
        }

        // --- DRAG & DROP ---
        function makeDraggable(element) {
            let isDragging = false; let lastTap = 0;
            const removeHandler = (e) => {
                if(drawMode) return; if (element.id === 'match-ball') return; 
                if (element.classList.contains('player-token')) {
                    const pid = element.dataset.playerId; const p = players.find(x => x.id === pid);
                    if (p) { p.onPitch = false; renderBench(); savePlayers(); }
                }
                element.remove(); if(e) e.preventDefault();
            };

            element.addEventListener('touchend', function(e) {
                if(drawMode) return; const tapLength = new Date().getTime() - lastTap;
                if (tapLength < 300 && tapLength > 0) removeHandler(e);
                lastTap = new Date().getTime(); if (isDragging) { isDragging = false; element.classList.remove('dragging'); }
            });

            element.addEventListener('dblclick', removeHandler);
            element.addEventListener('touchstart', (e) => { if(drawMode) return; isDragging = true; element.classList.add('dragging'); }, {passive: true});
            document.addEventListener('touchmove', (e) => { if (!isDragging || drawMode) return; e.preventDefault(); moveElement(element, e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            element.addEventListener('mousedown', (e) => { if(drawMode) return; isDragging = true; element.classList.add('dragging'); });
            document.addEventListener('mousemove', (e) => { if (!isDragging || drawMode) return; moveElement(element, e.clientX, e.clientY); });
            document.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; element.classList.remove('dragging'); } });
            document.addEventListener('mouseleave', () => { if (isDragging) { isDragging = false; element.classList.remove('dragging'); } });
        }

        function moveElement(element, clientX, clientY) {
            const pitchRect = pitch.getBoundingClientRect();
            let newLeft = clientX - pitchRect.left; let newTop = clientY - pitchRect.top;
            let boundOffset = element.classList.contains('football-token') ? 10 : 19;
            let boundOffsetBottom = element.classList.contains('player-token') ? 25 : boundOffset;
            newLeft = Math.max(boundOffset, Math.min(newLeft, pitchRect.width - boundOffset));
            newTop = Math.max(boundOffset, Math.min(newTop, pitchRect.height - boundOffsetBottom));
            element.style.left = newLeft + 'px'; element.style.top = newTop + 'px';
        }

    </script>
</body>
</html>
